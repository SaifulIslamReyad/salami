<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salami</title>
    <link rel="preconnect" href="https://www.youtube-nocookie.com" crossorigin>
    <link rel="preconnect" href="https://i.ytimg.com" crossorigin>
    <link rel="preconnect" href="https://s.ytimg.com" crossorigin>
    <link rel="preconnect" href="https://www.google.com" crossorigin>
    <link rel="preconnect" href="https://www.googlevideo.com" crossorigin>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000000;
            color: #fff;
            text-align: center;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        p {
            margin-top: 0;
            margin-bottom: 30px;
            font-size: 1.2rem;
            color: #e0e0e0;
        }

        .wheel-container {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 0 auto;
        }

        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #690013;
            z-index: 10;
            filter: drop-shadow(0px 2px 2px rgba(0, 0, 0, 0.5));
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 6px solid #8afc7d;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
        }

        .spin-btn {
            margin-top: 40px;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            background-color: #ff00e6;
            color: #1a4a38;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s, background-color 0.2s;
        }

        .spin-btn:hover {
            background-color: #ffea75;
            transform: scale(1.05);
        }

        .spin-btn:active {
            transform: scale(0.95);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 20;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #fff;
            color: #333;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            width: 280px;
            box-shadow: 0 0 20px #ffd700;
            animation: popIn 0.5s ease;
        }

        .modal-content h2 {
            color: #1a4a38;
            margin-top: 0;
            margin-bottom: 10px;
        }

        .modal-content p {
            color: #555;
            font-size: 1.1rem;
            margin-bottom: 15px;
        }

        iframe {
            width: 100%;
            height: 280px;
            border-radius: 10px;
            margin-bottom: 0;
            border: none;
            background-color: #000;
        }

        .video-wrap {
            position: relative;
            width: 100%;
            border-radius: 10px;
            overflow: hidden;
            background-color: #000;
            margin-bottom: 15px;
        }

        .video-wait {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: 700;
            color: #fff;
            background: rgba(0, 0, 0, 0.55);
            z-index: 2;
        }

        .close-btn {
            background: #1a4a38;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            width: 100%;
        }

        @keyframes popIn {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <p>চাকা স্পিন করে বুঝে নিন আপনার এসএসসির সালামি </p>

    <div class="wheel-container">
        <div class="pointer"></div>
        <svg viewBox="-100 -100 200 200" class="wheel" id="wheel">
            <g id="slices">
                <path d="M0,0 L0,-100 A100,100 0 0,1 86.6,-50 Z" fill="#FFC300"></path>
                <path d="M0,0 L86.6,-50 A100,100 0 0,1 86.6,50 Z" fill="#FF5733"></path>
                <path d="M0,0 L86.6,50 A100,100 0 0,1 0,100 Z" fill="#33FF57"></path>
                <path d="M0,0 L0,100 A100,100 0 0,1 -86.6,50 Z" fill="#3357FF"></path>
                <path d="M0,0 L-86.6,50 A100,100 0 0,1 -86.6,-50 Z" fill="#FF33A8"></path>
                <path d="M0,0 L-86.6,-50 A100,100 0 0,1 0,-100 Z" fill="#33FFF6"></path>
            </g>
            <g font-size="14" font-weight="bold" fill="white" text-anchor="middle" font-family="sans-serif">
                <text transform="rotate(30) translate(0, -70)" fill="#1a4a38">দোয়া</text> <text
                    transform="rotate(90) translate(0, -70)">বিরিয়ানি</text> <text
                    transform="rotate(150) translate(0, -70)" fill="#1a4a38">৫০ টাকা</text> <text
                    transform="rotate(210) translate(0, -70)">বদদোয়া</text> <text
                    transform="rotate(270) translate(0, -70)">এডভাইস</text> <text
                    transform="rotate(330) translate(0, -70)" fill="#1a4a38">১০০ টাকা</text>
            </g>
        </svg>
    </div>

    <button class="spin-btn" onclick="spinWheel()" id="spinBtn">স্পিন</button>

    <div class="modal" id="resultModal">
        <div class="modal-content">
            <h2>আলহামদুলিল্লাহ! </h2>
            <p>আপনি জিতেছেন: <strong> আনলিমিটেড দোয়া!</strong></p>

            <p style="font-weight: bold; color: #1a4a38;">
                মনযোগ দিয়ে পড়ুন , মনযোগ দিতে পয়সা লাগে না
            </p>

            <button class="close-btn" onclick="claimSalami()">দোয়া ক্লেইম করুন</button>
        </div>
    </div>

    <script>
        let currentRotation = 0;
        let isSpinning = false;

        function spinWheel() {
            if (isSpinning) return;
            isSpinning = true;

            const spins = Math.floor(Math.random() * 4) + 5;
            const riggedOffset = Math.floor(Math.random() * 40) + 10;
            currentRotation += (spins * 360) + (360 - riggedOffset) - (currentRotation % 360);

            const wheel = document.getElementById('wheel');
            wheel.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                document.getElementById('resultModal').style.display = 'flex';
                isSpinning = false;
            }, 4200);
        }

        function claimSalami() {
            window.location.href = "warning.html";
        }

        function closeModal() {
            document.getElementById('resultModal').style.display = 'none';
            const salamiVideo = document.getElementById('salamiVideo');
            salamiVideo.src = "";
            document.getElementById('videoWait').style.display = 'flex';
        }
    </script>

</body>

</html>
